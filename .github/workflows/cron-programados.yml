name: Programados Cron

# Dispara el procesamiento de gastos/transferencias programadas en producción.
# Necesario porque el backend corre en Vercel serverless y @nestjs/schedule
# no mantiene un proceso vivo entre requests.
#
# Secrets requeridos en el repo (Settings → Secrets and variables → Actions):
#   - CRON_SECRET:       token compartido con la env var del backend
#   - BACKEND_BASE_URL:  https://<tu-backend>.vercel.app/api  (sin trailing slash)

on:
  schedule:
    # Cada 15 minutos. GitHub puede retrasar la ejecución hasta ~10 min en
    # picos de carga; aceptable para la frecuencia diaria del cron interno.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: programados-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /programados/cron/run
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ] || [ -z "${BACKEND_BASE_URL}" ]; then
            echo "::error::Faltan secrets CRON_SECRET o BACKEND_BASE_URL"
            exit 1
          fi
          response=$(mktemp)
          http_status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${BACKEND_BASE_URL%/}/programados/cron/run") || true
          echo "HTTP $http_status"
          cat "$response" || true
          echo
          if [ "$http_status" != "200" ] && [ "$http_status" != "201" ]; then
            echo "::error::Cron endpoint respondió $http_status"
            exit 1
          fi
