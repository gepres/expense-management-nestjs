name: External Balance Cron

# Proyecta el saldo de expenses creados FUERA del backend (bot de WhatsApp:
# gastos-firebase-functions). Esos gastos llegan con `balanceApplied: false`
# y este cron los debita al sub-saldo correcto (cashBalance para "efectivo",
# bankBalance para el resto) y los marca aplicados.
#
# Necesario porque el backend corre en Vercel serverless y @nestjs/schedule
# no mantiene un proceso vivo entre requests (el @Cron(EVERY_MINUTE) de
# ExternalBalanceCron jamás dispara en prod).
#
# Secrets requeridos en el repo (Settings → Secrets and variables → Actions):
#   - CRON_SECRET:       token compartido con la env var del backend
#   - BACKEND_BASE_URL:  https://<tu-backend>.vercel.app/api  (sin trailing slash)

on:
  schedule:
    # Cada 5 minutos (mínimo permitido por GitHub Actions). GitHub puede
    # retrasar la ejecución hasta ~10 min en picos de carga; el efecto en
    # el usuario es que el bolsillo demora hasta ~15 min en reconciliarse
    # tras un gasto en efectivo por WhatsApp.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: external-balance-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /expenses/cron/balance-run
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ] || [ -z "${BACKEND_BASE_URL}" ]; then
            echo "::error::Faltan secrets CRON_SECRET o BACKEND_BASE_URL"
            exit 1
          fi
          response=$(mktemp)
          http_status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${BACKEND_BASE_URL%/}/expenses/cron/balance-run") || true
          echo "HTTP $http_status"
          cat "$response" || true
          echo
          if [ "$http_status" != "200" ] && [ "$http_status" != "201" ]; then
            echo "::error::Cron endpoint respondió $http_status"
            exit 1
          fi
